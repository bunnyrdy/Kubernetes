kind: Service
apiVersion: v1
metadata:
  name: mysql
  namespace: expense
  labels:
    app: mysql
    project: expense
    tier: db
spec:
  selector: # labels are used as selectors
    app: mysql
    tier: db
    project: expense
      
  ports:
  - protocol: TCP
    port: 3306 # service port
    targetPort: 3306
---

apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: expense
  labels:
    app: mysql
    tier: db
    project: expense
spec:
  clusterIP: None
  selector:
    app: mysql
    tier: db
    project: expense
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306